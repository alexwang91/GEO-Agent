name: verify
on:
  pull_request:
  push:
    branches: ["main"]
jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify runner docs
        run: |
          test -f AGENTS.md
          test -f README.md
          test -f docs/product-brief.md
          test -f docs/product-contract.md
          test -f docs/provider-status-language.md
          test -f docs/limitations.md
          test -f docs/autonomous-runner.md
          test -f docs/progress.md
          test -f docs/next-steps-plan.md
          test -f docs/development-principles.md
          test -f docs/long-run-growth-loop.md
          test -f docs/feedback-taxonomy.md
          test -f docs/feedback-log.md
          test -f docs/loop-trace.md
          test -f docs/handoff-decision.md
          test -f docs/review-and-renewal-loop.md
          test -f docs/harness-repair-loop.md
          test -f docs/loop-hypotheses.md
          test -f docs/stopper-policy.md
          test -f docs/loop-review.md
          test -f docs/runner-prompt.md
          test -f docs/state-audit.md
          test -f docs/project-evaluation-v5.md
          test -f docs/loop-v5.md
          test -f docs/project-evaluation-v6.md
          test -f docs/loop-v6.md
          test -f docs/project-evaluation-v7.md
          test -f docs/loop-v7.md
          test -f tests/test_docs_state_consistency.py
          test -f tests/test_product_contract_docs.py
          test -f tests/test_v8_01_foundation_invariants.py
          test -f tools/check_coverage.py
          test -f tools/check_python_style.py
          test -f tools/check_type_annotations.py
          test -f .github/pull_request_template.md
          grep -q "V8-01" docs/progress.md
          grep -q "V8-01" docs/next-steps-plan.md
          grep -q "GitHub-only" docs/runner-prompt.md
          ! find . -maxdepth 4 -type f \( -name noop -o -name dummy -o -name x -o -name y \) | grep .
  python-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run unit tests
        run: PYTHONPATH=src python -m unittest discover -s tests -v
  python-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Lint with network-free Python style gate
        run: python tools/check_python_style.py
      - name: Type-check with network-free annotation gate
        run: python tools/check_type_annotations.py
      - name: Run unit tests with coverage gate
        run: python tools/check_coverage.py
