name: verify
on:
  pull_request:
  push:
    branches: ["main"]
jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify repository docs
        run: |
          test -f README.md
          test -f docs/product-brief.md
          test -f docs/product-contract.md
          test -f docs/provider-status-language.md
          test -f docs/limitations.md
          test -f docs/v8-changelog.md
          test -f tests/test_product_contract_docs.py
          test -f tests/test_v8_01_foundation_invariants.py
          test -f tests/test_v8_02_03_entity_resolution.py
          test -f tests/test_v8_04_statistics_wiring.py
          test -f tests/test_v8_05_live_crawler.py
          test -f tools/check_coverage.py
          test -f tools/check_python_style.py
          test -f tools/check_type_annotations.py
          ! find . -maxdepth 4 -type f \( -name noop -o -name dummy -o -name x -o -name y \) | grep .
  python-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run unit tests
        run: PYTHONPATH=src python -m unittest discover -s tests -v
  python-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Lint with network-free Python style gate
        run: python tools/check_python_style.py
      - name: Type-check with network-free annotation gate
        run: python tools/check_type_annotations.py
      - name: Run unit tests with coverage gate
        run: python tools/check_coverage.py
